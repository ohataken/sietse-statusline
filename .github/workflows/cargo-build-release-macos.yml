name: cargo-build-release-macos

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release (aarch64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package (aarch64)
        run: tar -czf sietse-statusline-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release sietse-statusline

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: sietse-statusline-macos
          path: target/release/sietse-statusline
